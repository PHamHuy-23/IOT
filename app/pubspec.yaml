name: app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  # BLE communication
  flutter_blue_plus: ^1.31.1
  # Runtime permissions
  permission_handler: ^12.0.2
  # Key-value storage
  shared_preferences: ^2.2.0
  # State Management
  provider: ^6.0.0
  # Charts for heart rate visualization
  fl_chart: ^0.64.0
  # Database & Backend
  supabase_flutter: ^2.14.1
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
